<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Confirmation</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family: Arial, Helvetica, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f4; padding:40px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" border="0"
                       style="background-color:#ffffff; border-radius:8px; overflow:hidden;">

                    <tr>
                        <td align="center"
                            style="background-color:#2563eb; padding:32px 24px;">
                            <h1 style="margin:0; color:#ffffff; font-size:28px; font-weight:bold;">
                                Registration Confirmation
                            </h1>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:40px 32px; color:#333333; font-size:16px; line-height:1.6;">
                            <p style="margin:0 0 24px 0;">
                                Hello, <strong>{{name}}</strong>!
                            </p>

                            <p style="margin:0 0 24px 0;">
                                Thank you for registering on our platform.
                            </p>

                            <p style="margin:0 0 32px 0;">
                                Please confirm your registration by clicking the link below:
                            </p>

                            <table cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto 24px auto;">
                                <tr>
                                    <td align="center" bgcolor="#2563eb" style="border-radius:6px;">
                                        <a href="{{link}}"
                                           target="_blank"
                                           style="display:inline-block; padding:14px 28px; font-size:16px; color:#ffffff; text-decoration:none; font-weight:bold;">
                                            Confirm Registration
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin:0; font-size:14px; color:#666666; word-break:break-all;">
                                If the button does not work, copy and paste the link below into your browser:
                                <br /><br />
                                <a href="{{link}}"
                                   target="_blank"
                                   style="color:#2563eb; text-decoration:none;">
                                    {{link}}
                                </a>
                            </p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center"
                            style="padding:24px; background-color:#f9fafb; color:#888888; font-size:12px;">
                            © 2026 ToDo. All rights reserved.
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
